<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080c10"/>
<title>Graph Studio By Amlan Dey</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── Reset & Tokens ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c10; --panel:#0d1117; --panel2:#111820;
  --border:#1c2a3a; --border-glow:#254560;
  --accent:#00e5ff; --a2:#ff4d6d; --a3:#b8ff57; --a4:#ffc107;
  --text:#c9d8e8; --muted:#4a6a8a;
  --mono:'Space Mono',monospace; --disp:'Syne',sans-serif;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
  --tabh:62px;
}
html{height:100%;overflow:hidden}
body{
  height:100%; background:var(--bg); color:var(--text);
  font-family:var(--mono); overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:36px 36px;
}

/* ── App Shell ────────────────────────────────────── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}

/* ── Top Bar ──────────────────────────────────────── */
.topbar{
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; padding-top:calc(10px + var(--st));
  background:rgba(8,12,16,0.94); backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--border); z-index:200;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 14px rgba(0,229,255,0.25),inset 0 0 10px rgba(0,229,255,0.05);
}
.logo-text{font-family:var(--disp);font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;color:#fff}
.logo-text b{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}

/* Mode pill */
.mode-pill{
  display:flex;background:rgba(0,0,0,0.45);
  border:1px solid var(--border);border-radius:24px;overflow:hidden;
}
.mpb{
  padding:7px 18px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-family:var(--mono);font-size:0.68rem;letter-spacing:0.07em;
  transition:all .22s;touch-action:manipulation;min-width:48px;min-height:36px;
  position:relative;
}
.mpb.on{background:rgba(0,229,255,0.12);color:var(--accent)}
.mpb.on::after{
  content:'';position:absolute;bottom:0;left:15%;width:70%;height:2px;
  background:var(--accent);box-shadow:0 0 6px var(--accent);border-radius:2px;
}
.pulse-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--a3);box-shadow:0 0 8px var(--a3);
  animation:blink 2.2s ease-in-out infinite;flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Canvas Area ──────────────────────────────────── */
.canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 40%,rgba(0,40,60,0.3) 0%,transparent 65%);
  /* leave room for tab bar */
  padding-bottom:var(--tabh);
}
#c2d{position:absolute;inset:0;display:block;touch-action:none}
#c3d{position:absolute;inset:0}
#c3d canvas{display:block!important;width:100%!important;height:100%!important}

/* Empty state */
.empty{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;pointer-events:none;
  padding-bottom:var(--tabh);
}
.empty svg{opacity:.1}
.empty p{font-size:.65rem;color:var(--muted);opacity:.5;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:0 24px}

/* Overlay badges */
.badges{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:10}
.badge{
  background:rgba(8,12,16,0.82);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;font-size:.58rem;color:var(--muted);
  letter-spacing:.1em;backdrop-filter:blur(10px);
}

/* Hint strip */
.hints{
  position:absolute;bottom:calc(var(--tabh) + 10px);left:50%;transform:translateX(-50%);
  display:flex;gap:12px;font-size:.56rem;color:var(--muted);letter-spacing:.08em;
  background:rgba(8,12,16,0.78);border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;backdrop-filter:blur(10px);white-space:nowrap;z-index:10;pointer-events:none;
}
.hi{display:flex;align-items:center;gap:4px}
.hk{background:rgba(0,229,255,0.08);border:1px solid var(--border-glow);border-radius:4px;padding:1px 6px;color:var(--accent);font-size:.54rem}

/* Tooltip */
#tip{
  position:absolute;background:rgba(8,12,16,0.94);border:1px solid var(--border-glow);
  border-radius:10px;padding:6px 12px;font-size:.64rem;color:var(--accent);
  pointer-events:none;display:none;z-index:60;backdrop-filter:blur(10px);white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,229,255,0.15);
}

/* FABs */
.fabs{
  position:absolute;right:14px;bottom:calc(var(--tabh) + 14px);
  display:flex;flex-direction:column;gap:10px;z-index:20;
}
.fab{
  width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .2s;touch-action:manipulation;
  box-shadow:0 4px 24px rgba(0,0,0,0.55);
}
.fab:active{transform:scale(.89)}
.fab-plot{
  background:linear-gradient(135deg,rgba(184,255,87,0.22),rgba(0,229,255,0.18));
  border:1.5px solid var(--a3);color:var(--a3);
  box-shadow:0 4px 24px rgba(0,0,0,0.55),0 0 14px rgba(184,255,87,0.2);
}
.fab-add{
  background:rgba(0,229,255,0.1);border:1.5px solid var(--accent);color:var(--accent);
  box-shadow:0 4px 24px rgba(0,0,0,0.55),0 0 14px rgba(0,229,255,0.18);
}

/* ── Tab Bar ──────────────────────────────────────── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  height:calc(var(--tabh) + var(--sb));
  display:flex;background:rgba(8,12,16,0.96);backdrop-filter:blur(20px) saturate(1.5);
  border-top:1px solid var(--border);padding-bottom:var(--sb);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;touch-action:manipulation;border:none;background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:.52rem;letter-spacing:.08em;
  transition:color .2s;padding:8px 4px;min-height:44px;
}
.tab.active{color:var(--accent)}
.tab.active svg{filter:drop-shadow(0 0 5px var(--accent))}
.tab svg{transition:transform .15s}
.tab:active svg{transform:scale(.84)}
.tab-label{line-height:1}

/* ── Bottom Sheet ─────────────────────────────────── */
.backdrop{
  position:fixed;inset:0;background:transparent;z-index:390;
  pointer-events:none;transition:background .28s;
}
.backdrop.open{background:rgba(0,0,0,0.6);pointer-events:all}

.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:400;
  background:var(--panel);
  border-top:1px solid var(--border);border-radius:22px 22px 0 0;
  display:flex;flex-direction:column;
  transform:translateY(110%);transition:transform .34s cubic-bezier(.32,1,.38,1);
  max-height:82vh;box-shadow:0 -10px 50px rgba(0,0,0,0.65);
  padding-bottom:calc(var(--sb) + var(--tabh));
}
.sheet.open{transform:translateY(0)}

/* Handle */
.handle-row{padding:11px 0 6px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
.handle{width:38px;height:4px;border-radius:4px;background:var(--border-glow)}

/* Sheet header */
.sheet-hd{
  padding:2px 18px 12px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid var(--border);
}
.sheet-title{font-family:var(--disp);font-weight:700;font-size:.92rem;color:#fff;display:flex;align-items:center;gap:8px}
.sheet-title-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.sheet-x{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:8px;border-radius:10px;display:flex;touch-action:manipulation;transition:color .2s;
}
.sheet-x:active{color:var(--a2)}

/* Sheet body */
.sheet-body{
  overflow-y:auto;flex:1;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.sheet-body::-webkit-scrollbar{display:none}

/* Point card */
.pt{
  background:rgba(0,0,0,0.32);border:1px solid var(--border);border-radius:12px;
  padding:11px 12px;display:flex;align-items:center;gap:9px;
  animation:rise .18s ease;transition:border-color .2s;
}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.pt:focus-within{border-color:var(--border-glow)}
.pnum{font-size:.56rem;color:var(--accent);font-weight:700;min-width:22px;letter-spacing:.06em;flex-shrink:0}
.pcoords{flex:1;display:flex;gap:5px;min-width:0}
.cbox{
  flex:1;display:flex;align-items:center;gap:3px;min-width:0;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;
  padding:7px 8px;transition:border-color .2s;
}
.cbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,0.07)}
.clbl{font-size:.56rem;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.clbl.x{color:var(--accent)}.clbl.y{color:var(--a2)}.clbl.z{color:var(--a3)}
.cinp{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:.74rem;
  width:100%;min-width:0;
}
.cinp::placeholder{color:var(--muted);opacity:.4}
.del{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:7px;border-radius:8px;display:flex;touch-action:manipulation;
  transition:color .2s,background .2s;flex-shrink:0;
}
.del:active{color:var(--a2);background:rgba(255,77,109,0.13)}

/* Empty list */
.no-pts{text-align:center;color:var(--muted);font-size:.62rem;padding:22px 0;opacity:.4;letter-spacing:.1em}

/* Sheet footer actions */
.sheet-ft{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;gap:8px;flex-shrink:0;
}
.btn{
  flex:1;border:none;border-radius:11px;padding:14px 8px;cursor:pointer;
  font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .18s;touch-action:manipulation;min-height:48px;
}
.btn:active{transform:scale(.94)}
.btn-add{background:rgba(0,229,255,0.1);border:1px solid var(--accent);color:var(--accent)}
.btn-clr{background:rgba(255,77,109,0.07);border:1px solid rgba(255,77,109,0.25);color:var(--a2)}
.btn-plot{
  background:linear-gradient(135deg,rgba(184,255,87,0.13),rgba(0,229,255,0.1));
  border:1px solid var(--a3);color:var(--a3);
}
.btn-plot:active{box-shadow:0 0 18px rgba(184,255,87,0.25)}

/* Stats strip */
.stats{display:flex;border-top:1px solid var(--border);flex-shrink:0}
.stc{
  flex:1;padding:9px 0;text-align:center;
  font-size:.56rem;color:var(--muted);letter-spacing:.06em;
  border-right:1px solid var(--border);
}
.stc:last-child{border-right:none}
.stc span{display:block;color:var(--accent);font-size:.66rem;margin-top:2px}

/* ── Toast ────────────────────────────────────────── */
.toast{
  position:fixed;top:calc(68px + var(--st));left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:rgba(13,17,23,0.96);border:1px solid var(--border-glow);
  border-radius:12px;padding:9px 20px;font-size:.68rem;color:var(--accent);
  z-index:999;opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s;white-space:nowrap;
  backdrop-filter:blur(14px);box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{color:var(--a2);border-color:rgba(255,77,109,0.4)}

/* Utilities */
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
          <path d="M2 16L9 2L16 16" stroke="#00e5ff" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M4.5 11h9" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">Graph<b>Studio</b></span>
        <div style="font-size:.48rem;color:var(--muted);letter-spacing:.12em;margin-top:2px;font-family:var(--mono)">MADE BY <span style="color:var(--accent)">AMLAN DEY</span></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="mode-pill">
        <button class="mpb on" id="btn2d" onclick="setMode('2d')">2D</button>
        <button class="mpb"    id="btn3d" onclick="setMode('3d')">3D</button>
      </div>
      <div class="pulse-dot"></div>
    </div>
  </header>

  <!-- ── Canvas ── -->
  <div class="canvas-wrap" id="cWrap">
    <canvas id="c2d"></canvas>
    <div id="c3d"></div>

    <div class="empty" id="emptyState">
      <svg width="72" height="72" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="38" stroke="#00e5ff" stroke-width="1"/>
        <path d="M10 40h60M40 10v60" stroke="#00e5ff" stroke-width="1"/>
        <circle cx="24" cy="30" r="3.5" fill="#00e5ff"/>
        <circle cx="40" cy="19" r="3.5" fill="#ff4d6d"/>
        <circle cx="56" cy="34" r="3.5" fill="#b8ff57"/>
        <circle cx="34" cy="56" r="3.5" fill="#00e5ff"/>
      </svg>
      <p>Tap <b style="color:var(--accent)">Points</b> below to add coordinates,<br/>then tap <b style="color:var(--a3)">Plot</b></p>
    </div>

    <!-- Badges -->
    <div class="badges">
      <div class="badge" id="bMode">2D</div>
      <div class="badge" id="bPts">0 PTS</div>
    </div>

    <!-- Hints -->
    <div class="hints hidden" id="h2d">
      <div class="hi"><span class="hk">Touch</span>Hover point</div>
      <div class="hi"><span class="hk">↓ Plot</span>Draw</div>
    </div>
    <div class="hints hidden" id="h3d">
      <div class="hi"><span class="hk">Drag</span>Rotate</div>
      <div class="hi"><span class="hk">Pinch</span>Zoom</div>
      <div class="hi"><span class="hk">2-finger</span>Pan</div>
    </div>

    <!-- FABs -->
    <div class="fabs">
      <button class="fab fab-plot" onclick="plotGraph()" title="Plot">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 19L7 12L11 15.5L16 7L21 3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="fab fab-add" onclick="addPointAndOpen()" title="Add point">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div id="tip"></div>
  </div>

  <!-- ── Tab Bar ── -->
  <nav class="tabbar">
    <button class="tab" onclick="openSheet()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="5" cy="12" r="2.2" stroke="currentColor" stroke-width="1.7"/>
        <circle cx="12" cy="6" r="2.2" stroke="currentColor" stroke-width="1.7"/>
        <circle cx="19" cy="17" r="2.2" stroke="currentColor" stroke-width="1.7"/>
        <path d="M7.1 10.9l2.9-3.2M14 7.5l3.2 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="tab-label">POINTS</span>
    </button>
    <button class="tab" onclick="plotGraph()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M3 19L7 12L11 15.5L16 7L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">PLOT</span>
    </button>
    <button class="tab" onclick="clearAll()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1.4 14H6.4L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 11v5M14 11v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="tab-label">CLEAR</span>
    </button>
    <button class="tab" onclick="toggleMode()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 3L21 8.5V16L12 21L3 16V8.5L12 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M12 3v18M3 8.5l9 4.5 9-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="tab-label" id="modeTabLabel">SWITCH</span>
    </button>
  </nav>
</div>

<!-- Backdrop -->
<div class="backdrop" id="bd" onclick="closeSheet()"></div>

<!-- Points Sheet -->
<div class="sheet" id="sheet">
  <div class="handle-row" id="handleRow"><div class="handle"></div></div>
  <div class="sheet-hd">
    <span class="sheet-title">
      <span class="sheet-title-dot"></span>
      Data Points
    </span>
    <button class="sheet-x" onclick="closeSheet()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="sheet-body" id="ptList"></div>
  <div class="sheet-ft">
    <button class="btn btn-add" onclick="addPoint()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      ADD
    </button>
    <button class="btn btn-plot" onclick="plotAndClose()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 19L7 12L11 15.5L16 7L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      PLOT
    </button>
    <button class="btn btn-clr" onclick="clearAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      CLEAR
    </button>
  </div>
  <div class="stats">
    <div class="stc">POINTS<span id="sPts">0</span></div>
    <div class="stc">MODE<span id="sMode">2D</span></div>
    <div class="stc">X̄<span id="sMX">—</span></div>
    <div class="stc">Ȳ<span id="sMY">—</span></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let mode = '2d';
let points = [];
let pid = 0;

// Three.js
let rdr, scn, cam, animId;
let sph = { th: 0.75, ph: 1.05, r: 14 };
let drag = { on: false, x: 0, y: 0 };
let pinch0 = null, pinchR0 = 14;

/* ═══════════════════════════════════════════════════
   SHEET — swipe-to-dismiss
═══════════════════════════════════════════════════ */
let sheetDrag = false, sheetY0 = 0;

(function setupSheetDrag() {
  const hr = document.getElementById('handleRow');
  const sh = document.getElementById('sheet');

  function onStart(y) { sheetDrag = true; sheetY0 = y; }
  function onMove(y) {
    if (!sheetDrag) return;
    const dy = Math.max(0, y - sheetY0);
    sh.style.transition = 'none';
    sh.style.transform = `translateY(${dy}px)`;
  }
  function onEnd(y) {
    if (!sheetDrag) return;
    sheetDrag = false;
    sh.style.transition = '';
    sh.style.transform = '';
    if (y - sheetY0 > 90) closeSheet();
  }

  hr.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
  window.addEventListener('touchmove', e => { if (sheetDrag) onMove(e.touches[0].clientY); }, { passive: true });
  window.addEventListener('touchend', e => onEnd(e.changedTouches[0].clientY));
  hr.addEventListener('mousedown', e => onStart(e.clientY));
  window.addEventListener('mousemove', e => { if (sheetDrag) onMove(e.clientY); });
  window.addEventListener('mouseup', e => onEnd(e.clientY));
})();

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('bd').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('bd').classList.remove('open');
}

/* ═══════════════════════════════════════════════════
   MODE
═══════════════════════════════════════════════════ */
function setMode(m) {
  mode = m;
  document.getElementById('btn2d').classList.toggle('on', m === '2d');
  document.getElementById('btn3d').classList.toggle('on', m === '3d');
  document.getElementById('bMode').textContent = m.toUpperCase();
  document.getElementById('sMode').textContent = m.toUpperCase();
  document.getElementById('modeTabLabel').textContent = m === '2d' ? 'GO 3D' : 'GO 2D';
  document.getElementById('h2d').classList.toggle('hidden', m !== '2d');
  document.getElementById('h3d').classList.toggle('hidden', m !== '3d');
  renderList();
  clearCanvas();
}
function toggleMode() { setMode(mode === '2d' ? '3d' : '2d'); }

/* ═══════════════════════════════════════════════════
   POINTS
═══════════════════════════════════════════════════ */
function addPoint() {
  points.push({ id: pid++, x: '', y: '', z: '' });
  renderList();
  updateStats();
  // Scroll list to bottom
  requestAnimationFrame(() => {
    const b = document.getElementById('ptList');
    b.scrollTop = b.scrollHeight;
  });
}
function addPointAndOpen() { addPoint(); openSheet(); }

function removePoint(id) {
  points = points.filter(p => p.id !== id);
  renderList();
  updateStats();
}

function setVal(id, axis, v) {
  const p = points.find(p => p.id === id);
  if (p) p[axis] = v;
  updateStats();
}

function clearAll() {
  if (points.length === 0) { showToast('Nothing to clear'); return; }
  points = [];
  renderList();
  updateStats();
  clearCanvas();
  document.getElementById('emptyState').style.display = '';
  closeSheet();
}

function renderList() {
  const el = document.getElementById('ptList');
  if (!points.length) {
    el.innerHTML = `<div class="no-pts">NO POINTS YET<br/>Tap <span style="color:var(--accent)">ADD</span> below</div>`;
    return;
  }
  el.innerHTML = points.map((p, i) => {
    const zf = mode === '3d' ? `
      <div class="cbox">
        <span class="clbl z">Z</span>
        <input class="cinp" type="number" inputmode="decimal" placeholder="0" value="${p.z}"
          oninput="setVal(${p.id},'z',this.value)"/>
      </div>` : '';
    return `
    <div class="pt" id="pt-${p.id}">
      <span class="pnum">P${String(i + 1).padStart(2, '0')}</span>
      <div class="pcoords">
        <div class="cbox">
          <span class="clbl x">X</span>
          <input class="cinp" type="number" inputmode="decimal" placeholder="0" value="${p.x}"
            oninput="setVal(${p.id},'x',this.value)"/>
        </div>
        <div class="cbox">
          <span class="clbl y">Y</span>
          <input class="cinp" type="number" inputmode="decimal" placeholder="0" value="${p.y}"
            oninput="setVal(${p.id},'y',this.value)"/>
        </div>
        ${zf}
      </div>
      <button class="del" onclick="removePoint(${p.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

function updateStats() {
  const n = points.length;
  document.getElementById('sPts').textContent = n;
  document.getElementById('bPts').textContent = `${n} PTS`;
  if (!n) {
    document.getElementById('sMX').textContent = '—';
    document.getElementById('sMY').textContent = '—';
    return;
  }
  const xs = points.map(p => parseFloat(p.x) || 0);
  const ys = points.map(p => parseFloat(p.y) || 0);
  document.getElementById('sMX').textContent = (xs.reduce((a, b) => a + b) / n).toFixed(1);
  document.getElementById('sMY').textContent = (ys.reduce((a, b) => a + b) / n).toFixed(1);
}

/* ═══════════════════════════════════════════════════
   PLOT ROUTING
═══════════════════════════════════════════════════ */
function plotGraph() {
  const valid = points.filter(p => p.x !== '' && p.y !== '');
  if (!valid.length) { showToast('Add points with X & Y values first', true); return; }
  document.getElementById('emptyState').style.display = 'none';
  clearCanvas();
  if (mode === '2d') plot2D(valid);
  else plot3D(valid);
}
function plotAndClose() { plotGraph(); closeSheet(); }

function clearCanvas() {
  const cv = document.getElementById('c2d');
  cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
  cv.ontouchmove = null; cv.onmousemove = null;
  if (rdr) { cancelAnimationFrame(animId); rdr.dispose(); rdr = null; document.getElementById('c3d').innerHTML = ''; }
}

/* ═══════════════════════════════════════════════════
   2D PLOT
═══════════════════════════════════════════════════ */
function plot2D(pts) {
  const wrap = document.getElementById('cWrap');
  const cv = document.getElementById('c2d');
  // Account for tab bar height in canvas size
  const tabH = document.querySelector('.tabbar').offsetHeight;
  cv.width = wrap.clientWidth;
  cv.height = wrap.clientHeight - tabH;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  const data = pts.map(p => ({ x: +p.x || 0, y: +p.y || 0 })).sort((a, b) => a.x - b.x);
  const xs = data.map(d => d.x), ys = data.map(d => d.y);
  const mnX = Math.min(...xs), mxX = Math.max(...xs);
  const mnY = Math.min(...ys), mxY = Math.max(...ys);
  const px = (mxX - mnX) * 0.18 || 2, py = (mxY - mnY) * 0.18 || 2;
  const dX = [mnX - px, mxX + px], dY = [mnY - py, mxY + py];
  const mg = { t: 36, r: 20, b: 44, l: 50 };
  const pw = W - mg.l - mg.r, ph = H - mg.t - mg.b;
  const tx = x => mg.l + (x - dX[0]) / (dX[1] - dX[0]) * pw;
  const ty = y => mg.t + ph - (y - dY[0]) / (dY[1] - dY[0]) * ph;

  // Grid
  ctx.strokeStyle = 'rgba(0,229,255,0.04)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const gx = mg.l + pw * i / 8, gy = mg.t + ph * i / 8;
    ctx.beginPath(); ctx.moveTo(gx, mg.t); ctx.lineTo(gx, mg.t + ph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mg.l, gy); ctx.lineTo(mg.l + pw, gy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = 'rgba(0,229,255,0.18)'; ctx.lineWidth = 1;
  const ox = tx(0), oy = ty(0);
  if (ox >= mg.l && ox <= mg.l + pw) { ctx.beginPath(); ctx.moveTo(ox, mg.t); ctx.lineTo(ox, mg.t + ph); ctx.stroke(); }
  if (oy >= mg.t && oy <= mg.t + ph) { ctx.beginPath(); ctx.moveTo(mg.l, oy); ctx.lineTo(mg.l + pw, oy); ctx.stroke(); }

  // Labels
  ctx.font = '8px Space Mono,monospace';
  ctx.fillStyle = 'rgba(74,106,138,0.75)';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 8; i++) {
    const vx = dX[0] + (dX[1] - dX[0]) * i / 8;
    const vy = dY[0] + (dY[1] - dY[0]) * i / 8;
    ctx.fillText(vx.toFixed(1), tx(vx), mg.t + ph + 15);
    ctx.save(); ctx.textAlign = 'right';
    ctx.fillText(vy.toFixed(1), mg.l - 5, ty(vy) + 3.5);
    ctx.restore();
  }
  ctx.fillStyle = '#00e5ff';
  ctx.fillText('X', W - 10, mg.t + ph + 15);
  ctx.textAlign = 'right';
  ctx.fillText('Y', mg.l - 5, mg.t - 8);

  // Area fill
  if (data.length > 1) {
    const ag = ctx.createLinearGradient(0, mg.t, 0, mg.t + ph);
    ag.addColorStop(0, 'rgba(0,229,255,0.1)'); ag.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = ag; ctx.beginPath();
    data.forEach((d, i) => i === 0 ? ctx.moveTo(tx(d.x), ty(d.y)) : ctx.lineTo(tx(d.x), ty(d.y)));
    ctx.lineTo(tx(data[data.length - 1].x), ty(dY[0]));
    ctx.lineTo(tx(data[0].x), ty(dY[0]));
    ctx.closePath(); ctx.fill();

    // Line
    const lg = ctx.createLinearGradient(tx(data[0].x), 0, tx(data[data.length - 1].x), 0);
    lg.addColorStop(0, '#00e5ff'); lg.addColorStop(0.5, '#b8ff57'); lg.addColorStop(1, '#ff4d6d');
    ctx.strokeStyle = lg; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 10;
    ctx.beginPath();
    data.forEach((d, i) => i === 0 ? ctx.moveTo(tx(d.x), ty(d.y)) : ctx.lineTo(tx(d.x), ty(d.y)));
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Points
  const cols = ['#00e5ff', '#ff4d6d', '#b8ff57', '#ff9f43', '#a29bfe', '#fd79a8', '#55efc4'];
  data.forEach((d, i) => {
    const cx = tx(d.x), cy = ty(d.y), col = cols[i % cols.length];
    ctx.shadowColor = col; ctx.shadowBlur = 18;
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#080c10'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
    ctx.font = '9px Space Mono,monospace'; ctx.fillStyle = col; ctx.textAlign = 'center';
    ctx.fillText(`(${d.x}, ${d.y})`, cx, cy - 14);
  });

  // Tooltip (mouse + touch)
  function showTip(clientX, clientY) {
    const rect = cv.getBoundingClientRect();
    const sx = cv.width / rect.width, sy = cv.height / rect.height;
    const mx = (clientX - rect.left) * sx, my = (clientY - rect.top) * sy;
    const tp = document.getElementById('tip');
    let hit = null;
    data.forEach(d => {
      const dx = tx(d.x) - mx, dy = ty(d.y) - my;
      if (Math.sqrt(dx * dx + dy * dy) < 20) hit = d;
    });
    if (hit) {
      const lx = Math.min(clientX - rect.left + 14, rect.width - 130);
      const ly = Math.max(clientY - rect.top - 40, 4);
      tp.style.cssText = `display:block;left:${lx}px;top:${ly}px`;
      tp.textContent = `X: ${hit.x}  ·  Y: ${hit.y}`;
    } else {
      tp.style.display = 'none';
    }
  }

  cv.onmousemove = e => showTip(e.clientX, e.clientY);
  cv.onmouseleave = () => document.getElementById('tip').style.display = 'none';
  let tipTimer;
  cv.ontouchstart = e => { e.preventDefault(); showTip(e.touches[0].clientX, e.touches[0].clientY); };
  cv.ontouchend = () => { clearTimeout(tipTimer); tipTimer = setTimeout(() => document.getElementById('tip').style.display = 'none', 1400); };
}

/* ═══════════════════════════════════════════════════
   3D PLOT
═══════════════════════════════════════════════════ */
function plot3D(pts) {
  const wrap = document.getElementById('cWrap');
  const container = document.getElementById('c3d');
  const tabH = document.querySelector('.tabbar').offsetHeight;
  const W = wrap.clientWidth, H = wrap.clientHeight - tabH;

  scn = new THREE.Scene();
  cam = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
  rdr = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  rdr.setSize(W, H);
  rdr.setClearColor(0, 0);
  rdr.setPixelRatio(Math.min(devicePixelRatio, 2));
  container.appendChild(rdr.domElement);

  const data = pts.map(p => ({ x: +p.x || 0, y: +p.y || 0, z: +p.z || 0 }));
  const allX = data.map(d => d.x), allY = data.map(d => d.y), allZ = data.map(d => d.z);
  const cx = (Math.min(...allX) + Math.max(...allX)) / 2;
  const cy = (Math.min(...allY) + Math.max(...allY)) / 2;
  const cz = (Math.min(...allZ) + Math.max(...allZ)) / 2;
  const spread = Math.max(
    Math.max(...allX) - Math.min(...allX),
    Math.max(...allY) - Math.min(...allY),
    Math.max(...allZ) - Math.min(...allZ)
  ) || 2;
  const sc = 8 / spread;
  const mp = d => new THREE.Vector3((d.x - cx) * sc, (d.y - cy) * sc, (d.z - cz) * sc);

  // Grid + axes
  scn.add(new THREE.GridHelper(18, 18, 0x1c2a3a, 0x0d1117));
  const mkAx = (dir, col) => {
    const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), dir]);
    return new THREE.Line(g, new THREE.LineBasicMaterial({ color: col, linewidth: 2 }));
  };
  scn.add(mkAx(new THREE.Vector3(9, 0, 0), 0x00e5ff));
  scn.add(mkAx(new THREE.Vector3(0, 9, 0), 0xff4d6d));
  scn.add(mkAx(new THREE.Vector3(0, 0, 9), 0xb8ff57));

  // Axis label sprites
  function makeLabel(char, pos, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const c = canvas.getContext('2d');
    c.fillStyle = color; c.font = 'bold 40px monospace';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(char, 32, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.position.copy(pos); sprite.scale.set(0.8, 0.8, 1);
    return sprite;
  }
  scn.add(makeLabel('X', new THREE.Vector3(9.8, 0, 0), '#00e5ff'));
  scn.add(makeLabel('Y', new THREE.Vector3(0, 9.8, 0), '#ff4d6d'));
  scn.add(makeLabel('Z', new THREE.Vector3(0, 0, 9.8), '#b8ff57'));

  // Data points
  const COLORS = [0x00e5ff, 0xff4d6d, 0xb8ff57, 0xff9f43, 0xa29bfe, 0xfd79a8, 0x55efc4];
  const sGeo = new THREE.SphereGeometry(0.22, 20, 20);
  const mapped = data.map((d, i) => {
    const pos = mp(d);
    const col = COLORS[i % COLORS.length];
    const mat = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: 0.5, roughness: 0.22, metalness: 0.45
    });
    const mesh = new THREE.Mesh(sGeo, mat);
    mesh.position.copy(pos);
    scn.add(mesh);
    // Drop line to grid
    const dg = new THREE.BufferGeometry().setFromPoints([pos, new THREE.Vector3(pos.x, 0, pos.z)]);
    scn.add(new THREE.Line(dg, new THREE.LineBasicMaterial({ color: 0x1c2a3a, transparent: true, opacity: 0.5 })));
    return pos;
  });

  // Connect points
  if (mapped.length > 1) {
    const lg = new THREE.BufferGeometry().setFromPoints(mapped);
    scn.add(new THREE.Line(lg, new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.4 })));
  }

  // Lights
  scn.add(new THREE.AmbientLight(0x334466, 1.0));
  const dl = new THREE.DirectionalLight(0x00e5ff, 0.65); dl.position.set(5, 10, 7); scn.add(dl);
  const dl2 = new THREE.DirectionalLight(0xff4d6d, 0.28); dl2.position.set(-6, -4, -6); scn.add(dl2);

  sph = { th: 0.75, ph: 1.05, r: 14 };
  applyCam();

  // ── Touch controls ─────────────────────────────
  const el = rdr.domElement;
  el.style.touchAction = 'none';

  // Mouse
  el.addEventListener('mousedown', e => { drag = { on: true, x: e.clientX, y: e.clientY }; });
  window.addEventListener('mouseup', () => { drag.on = false; });
  window.addEventListener('mousemove', e => {
    if (!drag.on) return;
    rotateSph(e.clientX - drag.x, e.clientY - drag.y, 0.007);
    drag.x = e.clientX; drag.y = e.clientY;
  });
  el.addEventListener('wheel', e => { sph.r = clamp(sph.r + e.deltaY * 0.03, 3, 28); applyCam(); e.preventDefault(); }, { passive: false });

  // Touch — 1 finger: rotate; 2 fingers: pinch-zoom + pan
  let panStart = null;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      drag = { on: true, x: e.touches[0].clientX, y: e.touches[0].clientY };
      pinch0 = null;
    } else if (e.touches.length === 2) {
      drag.on = false;
      pinch0 = pinchLen(e.touches);
      pinchR0 = sph.r;
      panStart = pinchMid(e.touches);
    }
  }, { passive: false });

  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && drag.on) {
      rotateSph(e.touches[0].clientX - drag.x, e.touches[0].clientY - drag.y, 0.011);
      drag.x = e.touches[0].clientX; drag.y = e.touches[0].clientY;
    } else if (e.touches.length === 2 && pinch0 !== null) {
      // Zoom
      const d = pinchLen(e.touches);
      sph.r = clamp(pinchR0 * (pinch0 / d), 3, 28);
      applyCam();
    }
  }, { passive: false });

  el.addEventListener('touchend', e => {
    if (e.touches.length < 2) { pinch0 = null; panStart = null; }
    if (e.touches.length === 0) drag.on = false;
  });

  // Auto-rotate + animate
  function animate() {
    animId = requestAnimationFrame(animate);
    if (!drag.on && pinch0 === null) { sph.th += 0.003; applyCam(); }
    rdr.render(scn, cam);
  }
  animate();
}

function rotateSph(dx, dy, speed) {
  sph.th -= dx * speed;
  sph.ph = clamp(sph.ph - dy * speed, 0.15, Math.PI - 0.15);
  applyCam();
}
function applyCam() {
  if (!cam) return;
  cam.position.set(
    sph.r * Math.sin(sph.ph) * Math.cos(sph.th),
    sph.r * Math.cos(sph.ph),
    sph.r * Math.sin(sph.ph) * Math.sin(sph.th)
  );
  cam.lookAt(0, 0, 0);
}
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function pinchLen(ts) {
  const dx = ts[0].clientX - ts[1].clientX, dy = ts[0].clientY - ts[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function pinchMid(ts) {
  return { x: (ts[0].clientX + ts[1].clientX) / 2, y: (ts[0].clientY + ts[1].clientY) / 2 };
}

// Resize
window.addEventListener('resize', () => {
  if (mode === '3d' && rdr) {
    const wrap = document.getElementById('cWrap');
    const tabH = document.querySelector('.tabbar').offsetHeight;
    const W = wrap.clientWidth, H = wrap.clientHeight - tabH;
    rdr.setSize(W, H); cam.aspect = W / H; cam.updateProjectionMatrix();
  } else if (mode === '2d') {
    const v = points.filter(p => p.x !== '' && p.y !== '');
    if (v.length) plot2D(v);
  }
});

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
let tTimer;
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => t.className = 'toast', 2500);
}

/* ═══════════════════════════════════════════════════
   INIT — preload demo points
═══════════════════════════════════════════════════ */
[
  { x: '1', y: '3', z: '2' },
  { x: '3', y: '7', z: '4' },
  { x: '5', y: '4', z: '6' },
  { x: '7', y: '9', z: '3' },
  { x: '9', y: '5', z: '8' },
].forEach(p => points.push({ id: pid++, ...p }));

updateStats();
renderList();
setMode('2d');
</script>
