<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostSpectraX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:white;
  overflow:hidden;
}

header{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  z-index:10;
}

.logo{
  font-size:32px;
  color:#00e6ff;
  text-shadow:0 0 15px #00e6ff;
}

.panel{
  position:absolute;
  top:70px;
  left:15px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  backdrop-filter:blur(10px);
}

input, select{
  width:160px;
  margin:4px 0;
  padding:6px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:6px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,#00e6ff,#8a2be2);
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">👻 GhostSpectraX</div>
</header>

<div class="panel">
  <div>f(x,z)</div>
  <input id="eq" value="Math.sin(Math.sqrt(x*x+z*z))*3">

  <div>Mode</div>
  <select id="mode">
    <option value="3d">3D</option>
    <option value="2d">2D</option>
  </select>

  <div>Color</div>
  <input type="color" id="color" value="#00e6ff">

  <button onclick="generate()">Update</button>
</div>

<!-- ✅ MODULE VERSION (IMPORTANT FIX) -->
<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(20,20,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ✅ Controls FIXED
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Grid + axes
scene.add(new THREE.GridHelper(50,50));
scene.add(new THREE.AxesHelper(20));

let mesh;

// GRAPH GENERATOR
window.generate = function(){
  if(mesh) scene.remove(mesh);

  const eq = document.getElementById("eq").value;
  const color = document.getElementById("color").value;
  const mode = document.getElementById("mode").value;

  if(mode === "3d"){
    const geometry = new THREE.PlaneGeometry(30,30,100,100);
    const pos = geometry.attributes.position;

    for(let i=0;i<pos.count;i++){
      let x = pos.getX(i);
      let z = pos.getY(i);

      let y = 0;
      try{
        y = eval(eq);
      }catch{}

      pos.setZ(i,y);
    }

    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
      color:color,
      side:THREE.DoubleSide,
      wireframe:false
    });

    mesh = new THREE.Mesh(geometry,material);
    mesh.rotation.x = -Math.PI/2;
  }

  else{
    const points = [];
    for(let x=-30; x<30; x+=0.1){
      let y = 0;
      try{
        y = eval(eq.replace(/z/g,"0"));
      }catch{}
      points.push(new THREE.Vector3(x,y,0));
    }

    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({color:color});
    mesh = new THREE.Line(geometry, material);
  }

  scene.add(mesh);
}

// Light
const light = new THREE.PointLight(0xffffff,1);
light.position.set(20,20,20);
scene.add(light);

// First load
generate();

// Animation
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

// Resize fix
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
